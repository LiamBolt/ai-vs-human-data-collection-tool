<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI vs the Brain — Research Data Collection Platform" />
    <link rel="icon" type="image/png" href="/ai-human-logo.png" />
    <link rel="apple-touch-icon" href="/ai-human-logo.png" />
    <meta name="theme-color" content="#112330" />
    <title>AI vs the Brain</title>
    <script>
      // Apply the saved/preferred theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('aivb:theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
